name: Soccer xG experiment
# Research experiment: do xG-based ratings beat the goals-based model out-of-sample?
# Auto-runs when experiments/RUN.txt changes; commits its VERDICT back to the repo.
# Touches no production model.
on:
  workflow_dispatch: {}
  push:
    paths: ['experiments/RUN.txt']
permissions:
  contents: write
jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install numpy pandas
      - name: selftest gate
        run: python soccer_xg_experiment.py --selftest
      - name: run experiment -> verdict file
        run: |
          mkdir -p experiments
          set -o pipefail
          python soccer_xg_experiment.py --save-cache 2>&1 | tee experiments/SOCCER-XG-VERDICT.md || true
      - name: commit verdict
        if: always()
        run: |
          git config user.name soccer-bot
          git config user.email actions@github.com
          git add experiments/SOCCER-XG-VERDICT.md data/understat_xg.json || true
          if git diff --cached --quiet; then echo "no verdict change"; exit 0; fi
          git commit -m "Soccer xG experiment verdict $(date -u +%F)"
          for i in 1 2 3 4 5; do git pull --rebase --autostash origin main && git push && { echo pushed; exit 0; }; sleep 3; done
