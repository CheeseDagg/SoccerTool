name: Soccer staleness alarm
# Fails (= GitHub emails you) if the slate hasn't been rebuilt in 40h.
# A silent dead cron can no longer go unnoticed.
on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Slate freshness
        run: |
          TS=$(git log -1 --format=%ct -- "data/slate.json")
          [ -n "$TS" ] || { echo "::error::data/slate.json has never been committed"; exit 1; }
          AGE=$(( ($(date +%s) - TS) / 3600 ))
          echo "slate age: ${AGE}h (limit 40h)"
          if [ "$AGE" -gt "40" ]; then
            echo "::error::STALE — data/slate.json is ${AGE}h old. The daily pipeline has stopped. Check the main workflow runs."
            exit 1
          fi
          LATEST=$(python3 -c "import json; d=json.load(open('data/slate.json')); print(d.get('slate_end') or d.get('slate_date') or '')")
          TODAY=$(date -u +%F)
          echo "newest game in slate: ${LATEST:-unknown} (today $TODAY)"
          if [ -n "$LATEST" ] && [[ "$LATEST" < "$TODAY" ]]; then
            echo "::error::STALE DATA — newest fixture in the slate is $LATEST but today is $TODAY. The build runs but the fixture data is frozen (commit time alone wouldn't catch this)."
            exit 1
          fi
          echo "fresh (commit + fixture dates current)."
